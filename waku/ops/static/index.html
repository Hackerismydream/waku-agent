<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Waku わく</title>
<link rel="stylesheet" href="/static/style.css"></head><body>
<nav id="nav">
  <div class="brand">Waku わく<small id="model" style="cursor:pointer" title="点击切换模型" onclick="location.hash='#settings'"></small>
    <button id="nav-toggle" title="收起侧栏" aria-label="收起侧栏">&#10094;</button></div>
  <div class="grp">系统</div>
  <a href="#overview" data-v="overview">总览</a>
  <a href="#gateway" data-v="gateway">会话入口 <span class="n" id="n-gw"></span></a>
  <a href="#loop" data-v="loop">智能循环 <span class="n" id="n-loop"></span></a>
  <a href="#memory" data-v="memory">记忆 <span class="n" id="n-mem"></span></a>
  <a href="#tools" data-v="tools">工具 <span class="n" id="n-tools"></span></a>
  <a href="#database" data-v="database">数据库 <span class="n" id="n-db"></span></a>
  <a href="#ops" data-v="ops">运行与评测 <span class="n" id="n-ops"></span></a>
  <a href="#compare" data-v="compare">模型对比</a>
  <a href="#settings" data-v="settings">设置</a>
</nav>
<div class="resizer" id="nav-resizer" title="拖动调整侧栏宽度"></div>
<main>
  <header class="pagehead">
    <h1 id="title">总览</h1>
    <div class="sub" id="sub"></div>
  </header>
  <div id="view"></div>
</main>
<div class="resizer" id="dock-resizer" title="拖动调整聊天区宽度"></div>
<aside id="dock">
  <div class="dockhead">
    <span class="dt">对话</span>
    <span class="arch-status"></span>
    <button id="dock-close" title="收起聊天区" aria-label="收起聊天区">&rsaquo;</button>
  </div>
  <div class="sesshead" style="padding:8px 2px 0">
    <button class="sessbtn" onclick="newChat()">+ 新建</button>
    <button class="sessbtn" onclick="toggleSessMenu(event)">历史 &#9662;</button>
    <button class="sessbtn teletoggle" id="teletoggle" onclick="toggleTele()" title="显示或隐藏每轮详情：检索门、耗时、循环次数和工具">详情</button>
    <button class="modelchip" id="modelchip" onclick="toggleModelMenu(event)" title="切换当前对话使用的模型">&hellip;</button>
  </div>
  <div class="chatlog" id="docklog"></div>
  <div class="chatbar">
    <input id="dmsg" placeholder="给 Waku 发消息&hellip;" aria-label="给 Waku 发消息" autocomplete="off">
    <button id="mic" title="点击说话，使用本地 Whisper，不上传云端" aria-label="语音输入"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
    <button id="dsend">发送</button>
  </div>
</aside>
<button id="nav-reopen" title="展开侧栏" aria-label="展开侧栏">&#9776;</button>
<button id="dock-reopen" title="打开聊天区">&lsaquo; 对话</button>
<!-- Frontend is split into focused classic scripts sharing one global scope
     (no build step, no modules). Order matters only in that main.js runs the
     bootstrap and must load LAST. See static/README.md for the file map. -->
<script src="/static/js/util.js"></script>
<script src="/static/js/memory.js"></script>
<script src="/static/js/models.js"></script>
<script src="/static/js/render.js"></script>
<script src="/static/js/diagram.js"></script>
<script src="/static/js/views.js"></script>
<script src="/static/js/compare.js"></script>
<script src="/static/js/dock.js"></script>
<script src="/static/js/main.js"></script></body></html>
